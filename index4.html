<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intramurals | Team Checker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
background: linear-gradient(135deg,#ce2a2a,#890808);
font-family:'Segoe UI',sans-serif;
}
.nav-top{
position:absolute;
top:20px;
right:30px;
}
.nav-top a{
text-decoration:none;
padding:8px 16px;
border-radius:20px;
margin-left:8px;
background:#fff3cd;
color:#5D4A00;
font-weight:600;
}
.card{
border:none;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
background:#fffcef;
}
.btn-custom{
background:#b52a2a;
color:hsl(48, 100%, 95%);
border-radius:10px;
border:none;
}
.btn-custom:hover{
background:#a22b29;
}
</style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="nav-top">
<a href="index3.html">Sign Up</a>
<a href="index4.html">Team Checker</a>
<a href="index.html">Players</a>
</div>

<div class="card p-4" style="width:500px;">
<h4 class="text-center mb-4">Intramurals Team Checker</h4>

<div class="mb-3">
<label class="form-label">Are you registered?</label><br>
<input type="radio" name="registration" value="registered"> Yes
<input type="radio" name="registration" value="notRegistered"> No
</div>

<div class="mb-3">
<label class="form-label">Medical clearance secured?</label><br>
<input type="radio" name="clearance" value="cleared"> Yes
<input type="radio" name="clearance" value="notCleared"> No
</div>

<div class="mb-3">
<label class="form-label">Select Section</label>
<select id="section" class="form-select">
<option value="emerald">Emerald</option>
<option value="ruby">Ruby</option>
<option value="sapphire">Sapphire</option>
<option value="topaz">Topaz</option>
</select>
</div>

<div class="d-grid">
<button onclick="teamChecker()" class="btn btn-custom">Check Team</button>
</div>

<div id="teamOutput" class="text-center mt-3 fw-semibold"></div>
</div>

<script src="script.js"></script>
</body>
</html>
